<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" role="img" aria-labelledby="alt4-title">
  <title id="alt4-title">utxo AG Logo — Circuit/Flow</title>
  <!-- Concept: Clean circuit-style paths. Three inputs on left flow through a central transformation point to one output on right -->
  <!-- Input lines -->
  <line x1="4" y1="12" x2="16" y2="12" stroke="#000" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="4" y1="24" x2="16" y2="24" stroke="#000" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="4" y1="36" x2="16" y2="36" stroke="#000" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Input dots -->
  <circle cx="4" cy="12" r="2.5" fill="#000"/>
  <circle cx="4" cy="24" r="2.5" fill="#000"/>
  <circle cx="4" cy="36" r="2.5" fill="#000"/>
  <!-- Converging paths to center -->
  <path d="M16 12 L22 12 L26 24" stroke="#000" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <line x1="16" y1="24" x2="26" y2="24" stroke="#000" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M16 36 L22 36 L26 24" stroke="#000" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Central transform node -->
  <rect x="22" y="20" width="8" height="8" rx="2" fill="#000"/>
  <!-- Output line -->
  <line x1="30" y1="24" x2="44" y2="24" stroke="#000" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Output arrow -->
  <polygon points="40,19.5 46,24 40,28.5" fill="#000"/>
</svg>
